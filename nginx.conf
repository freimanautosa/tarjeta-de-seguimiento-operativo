server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://xjavnpwuhpmvpjdbjdeg.supabase.co; media-src 'self'; connect-src 'self' https://xjavnpwuhpmvpjdbjdeg.supabase.co https://automatizacionesfreimanautos-n8n.qs0sgf.easypanel.host; form-action 'self'; upgrade-insecure-requests" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /service-worker.js {
    add_header Cache-Control "no-cache";
    add_header Service-Worker-Allowed "/";
  }

  location /manifest.webmanifest {
    add_header Content-Type "application/manifest+json";
    add_header Cache-Control "no-cache";
  }
}
